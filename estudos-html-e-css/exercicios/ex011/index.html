<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>tente abrir esse site em vários dispositivos diferentes
        ou simplesmente aumente ou diminue o tamanho do seu 
        navegador
    </p>
    <picture>
    <source media="(max-width: 700px)" srcset="imagens/foto-p.png" type="image/png">
    <source media="(max-width: 1000px)" srcset="imagens/foto-m.png" type="image/png">
    <img src="imagens/foto-g.png" alt="imagem flexível">
</picture>
    <h1>Reproduzindo áudio</h1>
    <p>Vamos aprender a reproduzir audio em Html5</p>
   <audio preload="metadata" autoplay controls loop >
    <source src="midia/Intergalactic.mp3" type="audio/mpeg">
    <source src="midia/Intergalactic.ogg" type="audio/ogg">
    <source src="midia/Intergalactic.wav" type="audio/wav">
    <p>Infelizmente seu navegador nao consegue
         reproduzir 
         áudio. <a href="Intergalactic.mp3 ">Clique 
            aqui 
        para baixar o arquivo mp3</a></p>
   </audio> 
</body>
</html>
