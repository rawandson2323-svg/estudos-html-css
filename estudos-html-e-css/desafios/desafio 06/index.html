<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tegs</title>
</head>
<body>
    <h1>Tegs em Html</h1>
    <p>
        Em HTML5, podemos inserir os elementos da lista a segui. <br>
        Passe o mouse sobre os termos para descobrir qual tag deverá <br>
        utilizar em casa caso.
    </p>
        
        <ul>
            <li><abbr title="Use a teg &lt;p&gt;">Parágrafos</abbr> </li>
            <li><abbr title="Use a teg &lt;h1&gt;">Títulos</abbr></li>
            <li><abbr title="Use a teg &lt;img&gt;">Imagens</abbr></li>
            <li><abbr title="Use a teg &lt;abbr">Abreviações</abbr></li>
            <li><abbr title="Use a teg &lt;code&gt;">Códigos-fonte</abbr></li>
            <li><abbr title="Use a teg &lt;ol&gt;">Listas numeradas</abbr></li>
            <li><abbr title="Use a teg &lt;ul&gt;">Listas com demarcadores</abbr></li>
        </ul>

    
</body>
</html>
